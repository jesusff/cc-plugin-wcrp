# Checks VAR001
severity = "H"
variable_name = "time"

[coordinates.time.type]
# Checks VAR001
severity = "H"
data_type = "double"

[coordinates.time.monotonicity]
# Checks VAR005
severity = "H"
direction = "increasing"

[coordinates.time.attributes.axis]
# Checks ATTR001 ATTR002 ATTR003 ATTR004
severity = "H"
value_type = "str"
is_required = true
constant = "T"

[coordinates.time.attributes.standard_name]
# Checks ATTR001 ATTR002 ATTR003 ATTR004
severity = "H"
value_type = "str"
is_required = true
constant = "time"

[coordinates.time.attributes.calendar]
# Checks TIME003 ATTR001 ATTR002 ATTR003 ATTR004
severity = "H"
value_type = "str"
is_required = true
enum = [
    "standard",
    "proleptic_gregorian",
    "noleap",
    "365_day",
    "all_leap",
    "366_day",
    "360_day",
    "utc",
    "tai",
]

[coordinates.time.attributes.units]
# Checks ATTR001 ATTR002 ATTR003 ATTR004
severity = "H"
value_type = "str"
is_required = true
pattern = '^days since [0-9]{4}-[0-9]{1,2}-[0-9]{1,2}( [0-9]{2}:[0-9]{2}:[0-9]{2})?$'

[coordinates.time.attributes.bounds]
# Checks ATTR001 ATTR002 ATTR003 ATTR004
severity = "H"
value_type = "str"
is_required = false
as_variable = true

[coordinates.time.squareness]
# Check TIME001
severity = "H"
ref_calendar = ""
ref_time_units = ""
ref_increment = ""

[coordinates.time.coverage]
# Checks TIME002
